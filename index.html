<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>Thai Braille Converter Js</title>
    <script src="en-mapping.js"></script>
    <script src="th-mapping.js"></script>
    <script src="main-brailler.js"></script>
    <style>
      body { font-family: sans-serif; max-width: 720px; margin: 2em auto; }
      textarea, #output { width: 100%; font-family: monospace; box-sizing: border-box; }
      #output { margin: 10px 0; font-size: 1.6em; line-height: 1.4; word-break: break-all; }
    </style>
  </head>
  <body>
    <p>
      <strong>Thai Braille Converter Js</strong> turns Thai and English characters into braille
      (grade 0, uncontracted), following the official spec of the Foundation for the Blind in
      Thailand.
    </p>
    <p>
      Project page on <a href="https://github.com/auycro/th-brailler-js">GitHub</a>.
    </p>

    <textarea id="input" rows="10">อักษรเบรลล์ คือ อักษรที่ใช้ในระบบการเรียนการสอนสำหรับคนตาบอด ซึ่งเป็นการรวมกลุ่มของจุดนูนเขียนลงบนกระดาษ โดยใช้ปลายนิ้วมือสัมผัสในการอ่าน&#10;thank you</textarea>

    <div id="output"></div>

    <script>
      const input = document.querySelector('#input');
      const output = document.querySelector('#output');
      const render = () => { output.innerHTML = braillateHtml(input.value); };
      input.addEventListener('input', render);
      render();
    </script>
  </body>
</html>
